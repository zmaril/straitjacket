name: housekeeping
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  housekeeping:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: zmaril/housekeeping@v0.14.0   # pin the full version, not the moving @v1
