name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          # Cross-compiled from the arm64 macos-latest runner to dodge the
          # scarce/slow Intel macos-13 queue.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          cd "target/${{ matrix.target }}/release"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            7z a "$GITHUB_WORKSPACE/straitjacket-${{ matrix.target }}.zip" straitjacket.exe
          else
            tar -czf "$GITHUB_WORKSPACE/straitjacket-${{ matrix.target }}.tar.gz" straitjacket
          fi
      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: straitjacket-${{ matrix.target }}.*
