name: ci
# straitjacket-allow-file:duplication — GitHub Actions has no include for job
# scaffolding, so the per-job checkout + rust-setup + timeout preamble repeats
# across the matrix by design.
on:
  push:
    branches: [main]
  pull_request:

# Each job runs only when files that could affect it changed, gated off the `changes`
# filter. Job-level `if:` (not a workflow `paths:` filter) on purpose: a job skipped by
# `if:` reports "skipped", which a required status check treats as success — so a
# docs-site-only PR still satisfies the required Rust checks (and vice-versa), whereas a
# `paths:` filter would leave the required check pending forever and wedge the merge.

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      site: ${{ steps.filter.outputs.site }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'src/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            site:
              - 'site/**'
              - '.github/workflows/ci.yml'

  lint:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: test
        run: cargo test --all-features
      - name: Self-scan (dogfood)
        run: cargo run --release -- .

  # Mirror the Cloudflare deploy: a frozen-lockfile install fails if bun.lock and
  # package.json drift (e.g. a Dependabot bump that didn't touch the lockfile),
  # and the build catches anything that would break the static export.
  site:
    needs: changes
    if: ${{ needs.changes.outputs.site == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: install (frozen lockfile)
        run: bun install --frozen-lockfile
      - name: build
        run: bun run build
