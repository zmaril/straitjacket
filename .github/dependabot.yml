version: 2
updates:
  # Rust crate dependencies (Cargo.toml / Cargo.lock).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    groups:
      cargo-minor:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions used by the workflows and the composite action.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # The docs site's npm dependencies.
  - package-ecosystem: npm
    directory: "/site"
    schedule:
      interval: weekly
    groups:
      site-minor:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # TypeScript 7.0 is the native (Go) compiler rewrite and ships no
      # programmatic API, so Next.js and fumadocs/Volar can't consume it yet
      # (Microsoft's own guidance is to stay on 6.x for now). Hold TypeScript
      # at its current major — patch/minor still flow — and adopt the next
      # major deliberately once the toolchain supports it.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
