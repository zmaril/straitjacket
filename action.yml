name: straitjacket
description: Scan the repo for weird code LLMs tend to generate, and fail on findings.
branding:
  icon: alert-triangle
  color: orange

inputs:
  version:
    description: Release tag to download (e.g. v0.1.0), or "latest".
    required: false
    default: latest
  args:
    description: Arguments passed to straitjacket (paths and flags). Default scans the repo root.
    required: false
    default: "."
  working-directory:
    description: Directory to run the scan from.
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Install straitjacket
      shell: bash
      run: |
        set -euo pipefail
        repo="zmaril/straitjacket"
        asset="straitjacket-x86_64-unknown-linux-gnu.tar.gz"
        if [ "${{ inputs.version }}" = "latest" ]; then
          url="https://github.com/${repo}/releases/latest/download/${asset}"
        else
          url="https://github.com/${repo}/releases/download/${{ inputs.version }}/${asset}"
        fi
        echo "Downloading $url"
        mkdir -p "$RUNNER_TEMP/straitjacket"
        curl -sSfL "$url" | tar -xz -C "$RUNNER_TEMP/straitjacket"
        echo "$RUNNER_TEMP/straitjacket" >> "$GITHUB_PATH"

    - name: Run straitjacket
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: straitjacket ${{ inputs.args }}
