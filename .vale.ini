# straitjacket-allow-file[:duplication] — fleet-synced verbatim; identical copies are intentional
StylesPath = styles
MinAlertLevel = suggestion

Vocab = Powderworks
Packages = proselint

[*.md]
BasedOnStyles = Vale, proselint
# Spelling is codespell's job (see .fleet/codespell) — Vale's dictionary
# spell-check false-positives on every unknown jargon word. Keep Vale.Terms,
# which powers the Powderworks vocabulary's terminology enforcement.
Vale.Spelling = NO

[notes/**]
BasedOnStyles =
